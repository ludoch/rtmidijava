name: Build and Test

on:
  workflow_dispatch: # Allows manual on-demand trigger

jobs:
  build:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
        cache: 'maven'

    - name: Install ALSA (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev
        # Attempt to load virtual MIDI module. This might fail on some CI environments
        # but often works on standard GitHub Hosted Runners.
        sudo modprobe snd-virmidi || echo "Could not load snd-virmidi, skipping kernel module setup"

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Run Tests
      # We use -DfailIfNoTests=false because some hardware-specific tests might skip
      run: mvn test -B
